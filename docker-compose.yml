services:
  jinn:
    build: .
    ports:
      - "7777:7777"
    volumes:
      # Persistent data (config, sessions, org, logs...)
      - ./docker/data:/data
      # Mount host claude credentials so auth is shared
      - ~/.claude:/home/jinn/.claude:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
