name: Phase
description: Phase の追跡
labels: ["phase"]
body:
  - type: input
    id: phase-doc
    attributes:
      label: Phase 定義書
      description: PD-NNN-slug.md へのパス
      placeholder: "docs/requirements/PD-001-user-management.md"
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: GitHub Milestone
      description: 対応する Milestone 名
      placeholder: "Phase 1: User Management"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: Phase の概要（詳細は Phase 定義書を参照）
    validations:
      required: true
