# lefthook.yml — Git フック設定
# https://lefthook.dev
# インストール: lefthook install
# スキップ（緊急時のみ）: git commit --no-verify

pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm lint
      stage_fixed: false

    - name: typecheck
      glob: "*.ts"
      run: pnpm typecheck
      stage_fixed: false

    - name: actionlint
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}

pre-push:
  jobs:
    - name: build
      run: pnpm build

    - name: unit-tests
      run: pnpm test
