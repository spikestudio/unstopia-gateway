# lefthook.yml — Git フック設定
# https://lefthook.dev
# インストール: lefthook install
# スキップ（緊急時のみ）: git commit --no-verify

pre-commit:
  parallel: true
  jobs:
    - name: typecheck
      glob: "*.ts"
      run: pnpm typecheck
      stage_fixed: false

    - name: biome
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm biome check --no-errors-on-unmatched {staged_files}
      stage_fixed: false

    - name: actionlint
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}

pre-push:
  parallel: true
  jobs:
    - name: build
      run: pnpm build
    - name: unit-tests
      run: mise exec -- pnpm test
