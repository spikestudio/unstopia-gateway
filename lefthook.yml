# lefthook.yml — Git フック設定
# https://lefthook.dev
# インストール: lefthook install
# スキップ（緊急時のみ）: git commit --no-verify

pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "**/*.{ts,tsx,js,jsx,json}"
      run: pnpm lint
      stage_fixed: false

    - name: typecheck
      glob: "**/*.ts"
      run: pnpm typecheck
      stage_fixed: false

    - name: actionlint
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}

pre-push:
  jobs:
    - name: build
      run: pnpm build

    - name: unit-tests
      run: pnpm test

commit-msg:
  jobs:
    - name: conventional-commits
      run: |
        MSG=$(cat "{1}")
        if ! echo "$MSG" | grep -qE "^(feat|fix|chore|docs|refactor|test|style|ci|perf|revert)(\(.+\))?: .+"; then
          echo "Error: コミットメッセージが Conventional Commits 形式に準拠していません。"
          echo "  正しい形式: <type>(<scope>): <subject>"
          echo "  例: feat(engine): add Antigravity adapter"
          echo "  使用可能な type: feat, fix, chore, docs, refactor, test, style, ci, perf, revert"
          exit 1
        fi
